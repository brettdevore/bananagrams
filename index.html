<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWO.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <header class="header">
            <h1>TWO.</h1>
            <div style="text-align: right;">
                <div class="score-display">Streak: <span id="score">0</span></div>
                <div class="score-display" style="font-size: 0.75rem; margin-top: 4px;">Best: <span id="best-score">0</span></div>
            </div>
        </header>
        
        <div class="card-container">
            <div id="card" class="card">
                <div class="card-inner">
                    <div class="card-front">
                        <h2 id="word-display" class="word">...</h2>
                    </div>
                    <div class="card-back">
                        <h2 id="word-result" class="word-small"></h2>
                        <div id="result-status" class="status-badge"></div>
                        <p id="definition" class="definition"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls front-controls" id="guessing-controls">
            <button id="btn-fake" class="btn btn-secondary">Fake</button>
            <button id="btn-real" class="btn btn-primary">Real</button>
        </div>
        <div class="controls back-controls hidden" id="next-controls">
            <button id="btn-next" class="btn btn-primary btn-full">Next Word</button>
        </div>

        <div id="missed-words-container" class="missed-words hidden">
            <h3>Missed Words</h3>
            <p id="missed-words-list"></p>
        </div>
        <button id="btn-clear" class="btn btn-secondary" style="margin-top: 24px; padding: 12px; font-size: 0.875rem;">Clear Progress</button>
    </main>
    <script src="words.js"></script>
    <script src="main.js"></script>
</body>
</html>
